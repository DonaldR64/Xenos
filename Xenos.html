<input type="hidden" class="sheet-tabstoggle" name="attr_sheetTab"  value="display"  />
<div>
    <button type="action" name="act_input" >Input</button>
    <button type="action" name="act_display" >Display</button>
    <button type="action" name="act_abilities" >Special Rules</button>
</div>

<div class="sheet-input">
    <div class="2colrow">
        <div class="col">
            <h3>Unit Information</h3>
            <label>Name:</label><input type="text" name="attr_character_name">
            <br>
            <label for="attr_type">Type:</label>
            <select name="attr_type">
                <option value="" selected disabled hidden>Choose here</option>
                <option value="Elite Infantry">Elite Infantry</option>
                <option value="Heavy Infantry">Heavy Infantry</option>
                <option value="Light Infantry">Light Infantry</option>
                <option value="Berserk Infantry">Berserk Infantry</option>
                <option value="Support Infantry">Support Infantry</option>
                <option value="Recon Infantry">Recon Infantry</option>
                <option value="Primitive Infantry">Primitive Infantry</option>
                <option value="Militia Rabble">Militia Rabble</option>
                <option value="Greater Xenomorphs">Greater Xenomorphs</option>
                <option value="Lesser Xenomorphs">Lesser Xenomorphs</option>
                <option value="Fighting Vehicle">Fighting Vehicle</option>
                <option value="Transport Vehicle">Transport Vehicle</option>
                <option value="Soft-skin Vehicle">Soft-skin Vehicle</option>
            </select>
            <br>
            <label for="attr_faction">Faction:</label>
            <select name="attr_faction">
                <option value="" selected disabled hidden>Choose here</option>
                <option value="Orks">Orks</option>
                <option value="Blood Angels">Blood Angels</option>
               
            </select>
        </div>
        <div class="col">
            <h3>Attributes</h3>
            <label>Attack:</label><input type="text" name="attr_attackon">
            <label>Move:</label><input type="text" name="attr_moveon">
            <label>Shoot:</label><input type="text" name="attr_shooton">
            <label>Courage:</label><input type="text" name="attr_courage">
            <label>Armour:</label><input type="text" name="attr_armour">
            <label>Attack Value:</label><input type="text" name="attr_attackval">
            <label>Defence Value:</label><input type="text" name="attr_defenceval">
            <label>Shoot Value:</label><input type="text" name="attr_shootval">
            <label>Max Movement:</label><input type="text" name="attr_moverate">
        </div>
        <div class="col">
            <label>Weapon 1:</label><input type="text" name="attr_weapon1name">
            <label>Weapon 1 Range:</label><input type="text" name="attr_weapon1range">
            <label>Weapon 1 Special:</label><input type="text" name="attr_weapon1special">
            <label>Weapon 2:</label><input type="text" name="attr_weapon2name">
            <label>Weapon 2 Range:</label><input type="text" name="attr_weapon2range">
            <label>Weapon 2 Special:</label><input type="text" name="attr_weapon2special">
        </div>
        <div class="col">
            <label>Special Abilities:</label><input type="text" name="attr_special">
        </div>






    </div>    


</div>



<div class="sheet-display">
    <input type="hidden" name="attr_faction"/>
    <div class="mysheet">
      <div class="bits">
        <main>
          <section class="common">
                <div class="top-right">
                    <h1><span name="attr_character_name"></span></h1>   
                    <h3><span name="attr_faction"></span></h3>
                    <h3><span name="attr_type"></span></h3>
                </div>
              <img alt="Character Avatar" name="attr_character_avatar" style="width:600px;height:auto; bottom: 0;"/>
          </section>

          <section class="attr">
            <h3>Activations</h3>
            <div class="attrinfo">
                <h4>Attack</h4>
                <h4>Move</h4>
                <h4>Shoot</h4>
                <h4 style="color: darkred;"><span name="attr_attackon"></span></h4>
                <h4 style="color: darkred;"><span name="attr_moveon"></span></h4>
                <h4 style="color: darkred;"><span name="attr_shooton"></span></h4>
            </div>
          </section>

          <section class="attr2">
            <h3>Stats</h3>
            <div class="attr2info">
                <h4>Courage</h4>
                <h4>Armour</h4>
                <h4>Movement</h4>
                <h4 style="color: darkred;"><span name="attr_courage"></span></h4>
                <h4 style="color: darkred;"><span name="attr_armour"></span></h4>
                <h4 style="color: darkred;"><span name="attr_moverate"></span></h4>
            </div>
          </section>

          <section class="attr3">
            <h3>Combat</h3>
            <div class="attr3info">
                <h4>Attack</h4>
                <h4>Defence</h4>
                <h4>Shoot</h4>
                <h4 style="color: darkred;"><span name="attr_attackval"></span></h4>
                <h4 style="color: darkred;"><span name="attr_defenceval"></span></h4>
                <h4 style="color: darkred;"><span name="attr_shootval"></span></h4>
            </div>
          </section>

          <section class="weapons">
            <h3>Weapons</h3>
            <div class="weaponinfo">
                <h4>Name</h4>
                <h4>Range Band</h4>
                <h4>Special</h4>
                <h4 style="color: darkred;"><span name="attr_weapon1name"></span></h4>
                <h4 style="color: darkred;"><span name="attr_weapon1range"></span></h4>
                <h4 style="color: darkred;"><span name="attr_weapon1special"></span></h4>
                <h4 style="color: darkred;"><span name="attr_weapon2name"></span></h4>
                <h4 style="color: darkred;"><span name="attr_weapon2range"></span></h4>
                <h4 style="color: darkred;"><span name="attr_weapon2special"></span></h4>
            </div>
          </section>




          <section class="spec">
            <h3>Special Abilities</h3>
            <h4 style="color: darkred;"><span name="attr_special"></span></h4>
          </section>




        </main>
      </div>
    </div>    
</div>



<script type="text/worker">
    const buttonlist = ["input","display","abilities"];
    buttonlist.forEach(button => {
        on(`clicked:${button}`, function() {
            setAttrs({
                sheetTab: button
            });
        });
    });
    
    on("sheet:opened", function() {
        setAttrs({sheetTab:"display"});
    });

</script>
